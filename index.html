<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Portfolio of Biswa Prakash Acharya - PLM Engineer">
  <meta name="author" content="Biswa Prakash Acharya">
  <title>Biswa Prakash Acharya | PLM Engineer Portfolio</title>

  <!-- Google Fonts: Montserrat, Inter, JetBrains Mono with font-display swap -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">

  <!-- Preload hero background image for faster LCP -->
  <link rel="preload" href="assets/hero-bg.jpg" as="image">

  <!-- CSS: Theme first, then base, then responsive -->
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <!-- Sidebar Navigation -->
  <nav class="sidebar" id="sidebar" aria-label="Main navigation">
    <ul class="sidebar__nav-list">
      <!-- Navigation items will be rendered by JS -->
    </ul>
  </nav>

  <!-- Main Content Area -->
  <main class="main-content" id="main-content">
    <!-- Hero Section -->
    <section id="hero" class="section section--hero" aria-label="Hero">
    </section>

    <!-- About Section -->
    <section id="about" class="section section--about" aria-label="About">
    </section>

    <!-- Experience Section -->
    <section id="experience" class="section section--experience" aria-label="Experience">
    </section>

    <!-- Skills Section -->
    <section id="skills" class="section section--skills" aria-label="Skills">
    </section>

    <!-- Tools Built Section -->
    <section id="tools" class="section section--tools" aria-label="Tools Built">
    </section>

    <!-- Projects Section -->
    <section id="projects" class="section section--projects" aria-label="Projects">
    </section>

    <!-- Project Experience & Internships Section -->
    <section id="internships" class="section section--internships" aria-label="Project Experience & Internships">
    </section>

    <!-- Education Section -->
    <section id="education" class="section section--education" aria-label="Education">
    </section>

    <!-- Certifications Section -->
    <section id="certifications" class="section section--certifications" aria-label="Certifications">
    </section>

    <!-- Contact Section -->
    <section id="contact" class="section section--contact" aria-label="Contact">
    </section>

    <!-- System Footer -->
    <footer class="system-footer" style="text-align: center; padding: 40px 20px; font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-secondary); opacity: 0.6; letter-spacing: 1px; text-transform: uppercase;">
      SYSTEM LOG: Portfolio UI Successfully Deployed &nbsp;|&nbsp; Status: ACTIVE
    </footer>
  </main>

  <!-- Main Application Script -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
